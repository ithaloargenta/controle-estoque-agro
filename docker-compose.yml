services:

  db:
    image: postgres:16
    container_name: estoque_db
    environment:
      POSTGRES_USER: estoque_user
      POSTGRES_PASSWORD: estoque_pass
      POSTGRES_DB: estoque_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U estoque_user -d estoque_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: estoque_app
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: estoque_frontend
    environment:
      - API_URL=http://app:8000
    ports:
      - "8501:8501"
    depends_on:
      - app
    volumes:
      - ./frontend:/app

volumes:
  postgres_data: